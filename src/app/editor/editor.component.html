<div class="flex h-screen w-screen text-slate-800 font-sans">

  <!-- LEFT Sidebar — always visible: fields + tools -->
  <aside class="w-[260px] min-w-[260px] bg-white py-6 px-5 flex flex-col gap-6 shadow-[1px_0_10px_rgba(0,0,0,0.03)] z-10 overflow-hidden">

    <!-- Logo -->
    <div class="flex items-center gap-2.5 shrink-0 pb-2 border-b border-slate-100">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-sm shrink-0">
        <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="16" rx="2"/>
          <path d="M7 9h10M7 13h6"/>
          <circle cx="17" cy="16" r="2.5" fill="currentColor" stroke="none"/>
          <path d="M16 15.5l1 1 2-2" stroke="white" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      <div class="leading-none">
        <span class="text-[17px] font-bold tracking-tight text-slate-800">Certify<span class="text-blue-600">Pro</span></span>
        <p class="text-[10px] text-slate-400 mt-0.5 font-medium">Certificate Designer</p>
      </div>
    </div>

    <!-- Available Fields -->

    <div class="flex-1 flex flex-col gap-3 min-h-0">
      <label class="text-[13px] font-semibold text-slate-400 tracking-[0.2px] shrink-0">Available Fields</label>
      <p class="text-[11px] text-slate-400 shrink-0">Drag to canvas</p>
      <div class="flex flex-col gap-2 overflow-y-auto pr-2 scrollbar-thin flex-1 min-h-0">
        <div *ngFor="let field of availableFields"
             draggable="true"
             (dragstart)="onDragStartNew($event, field)"
             class="bg-[#f3f6f8] text-[#2fb13c] text-sm font-medium py-2.5 px-3.5 rounded cursor-grab transition-all hover:bg-[#eaf1ed] active:cursor-grabbing shrink-0">
          {{ field }}
        </div>

        <!-- QR Code special drag item -->
        <div draggable="true"
             (dragstart)="onDragStartNew($event, qrField)"
             class="mt-1 flex items-center gap-2.5 bg-violet-50 border border-violet-200 text-violet-700 text-sm font-semibold py-2.5 px-3.5 rounded-lg cursor-grab transition-all hover:bg-violet-100 active:cursor-grabbing shrink-0">
          <!-- mini QR icon -->
          <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <rect x="5" y="5" width="3" height="3" fill="currentColor" stroke="none"/>
            <rect x="16" y="5" width="3" height="3" fill="currentColor" stroke="none"/>
            <rect x="5" y="16" width="3" height="3" fill="currentColor" stroke="none"/>
            <path d="M14 14h3v3h-3zM17 17h3v3h-3zM14 20h3"/>
          </svg>
          QR Code
        </div>
      </div>
    </div>

    <!-- Upload Background -->
    <div class="flex flex-col gap-3 shrink-0">
      <label for="bg-upload" class="border-2 border-dashed border-[#c0c9d8] rounded-lg bg-[#fafbfd] flex flex-col items-center justify-center py-6 px-4 gap-3 cursor-pointer transition-colors hover:bg-[#f1f5ff] hover:border-[#92abf2]">
        <div class="text-[#c9c4db] flex">
          <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="12" y1="18" x2="12" y2="12"></line>
            <line x1="9" y1="15" x2="15" y2="15"></line>
          </svg>
        </div>
        <span class="text-[#4b8af7] text-xs font-medium">Upload background image</span>
      </label>
      <input type="file" id="bg-upload" class="hidden" accept="image/*" (change)="onBackgroundUpload($event)">
    </div>

    <!-- Layout Buttons -->
    <div class="flex flex-row gap-3 shrink-0">
      <button [ngClass]="layout === 'portrait' ? 'border-[#d1ead1] bg-[#fafffa] text-[#47b848]' : 'border-slate-200 bg-white text-[#7bb57b] hover:bg-slate-50'"
              (click)="setLayout('portrait')"
              class="flex-1 border rounded-lg py-2.5 flex flex-col items-center justify-center cursor-pointer transition-colors">
        <span class="text-[13px] font-semibold leading-relaxed">A4</span>
        <span class="text-[13px] font-semibold leading-relaxed">Portrait</span>
      </button>
      <button [ngClass]="layout === 'landscape' ? 'border-[#d1ead1] bg-[#fafffa] text-[#47b848]' : 'border-slate-200 bg-white text-[#7bb57b] hover:bg-slate-50'"
              (click)="setLayout('landscape')"
              class="flex-1 border rounded-lg py-2.5 flex flex-col items-center justify-center cursor-pointer transition-colors">
        <span class="text-[13px] font-semibold leading-relaxed">A4</span>
        <span class="text-[13px] font-semibold leading-relaxed">Landscape</span>
      </button>
    </div>

    <!-- Export JSON Button -->
    <div class="shrink-0">
      <button (click)="downloadJson()" class="px-4 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-semibold text-sm w-full flex items-center justify-center gap-2 shadow-sm">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Export Output
      </button>
    </div>
  </aside>

  <!-- MAIN Canvas Area -->
  <main class="flex-1 bg-[#f3f6fa] p-4 flex overflow-hidden min-w-0">
    <div #wrapper class="flex-1 bg-transparent border-2 border-dashed border-[#b1b9ca] rounded-2xl m-2 relative overflow-hidden shadow-inner flex items-center justify-center p-8 min-w-0"
         (click)="onCanvasClick()">

      <!-- The Canvas Document -->
      <div class="bg-white shadow-[0_4px_24px_rgba(0,0,0,0.08)] relative box-border overflow-hidden transition-all duration-300 transform origin-center shrink-0"
           [style.transform]="'scale(' + canvasScale + ')'"
           [style.backgroundImage]="backgroundImage ? 'url(' + backgroundImage + ')' : null"
           [style.backgroundSize]="'100% 100%'"
           [style.backgroundPosition]="'center'"
           [style.backgroundRepeat]="'no-repeat'"
           [ngClass]="{
             'w-[794px] h-[1123px]': layout === 'portrait',
             'w-[1123px] h-[794px]': layout === 'landscape'
           }"
           (dragover)="allowDrop($event)"
           (drop)="onDrop($event)">

           <!-- Elements placed inside the canvas -->
           <div *ngFor="let el of elements"
                draggable="true"
                (dragstart)="onDragStartExisting($event, el)"
                (click)="onCanvasElementClick($event, el)"
                class="absolute overflow-visible border-2 transition-colors font-sans shadow-sm rounded flex items-center"
                [ngClass]="focusedElement?.id === el.id
                  ? (el.field === '__QRCode__' ? 'border-violet-400 z-50 ring-2 ring-violet-100 cursor-default' : 'border-blue-400 z-50 ring-2 ring-blue-100 cursor-pointer')
                  : (el.field === '__QRCode__' ? 'border-dashed border-violet-300 hover:border-violet-400 z-10 cursor-default' : 'border-dashed border-blue-200/60 hover:border-blue-300 z-10 cursor-pointer')"
                [ngClass]="el.field === '__QRCode__' ? 'bg-violet-50/50' : 'bg-blue-50/30'"
                [style.left.px]="el.x"
                [style.top.px]="el.y"
                [style.width.px]="el.width"
                [style.height.px]="el.field === '__QRCode__' ? el.width : el.fontSize * 1.6"
                [style.fontSize.px]="el.fontSize"
                [style.color]="el.color"
                [style.fontWeight]="el.fontWeight"
                [style.textAlign]="el.textAlign">

                <!-- QR placeholder visual -->
                <ng-container *ngIf="el.field === '__QRCode__'">
                  <div class="w-full h-full"
                       [style.background]="el.qrBgColor || '#ffffff'"
                       style="padding:2px; border-radius:2px; overflow:hidden">
                    <svg class="w-full h-full" viewBox="0 0 23 23"
                         xmlns="http://www.w3.org/2000/svg"
                         shape-rendering="crispEdges">
                      <!-- Background fill -->
                      <rect x="0" y="0" width="23" height="23"
                            [attr.fill]="el.qrBgColor || '#ffffff'"/>

                      <!-- === FINDER PATTERNS (3 corner boxes) === -->
                      <!-- Top-Left -->
                      <rect x="1" y="1" width="7" height="7"
                            [attr.rx]="el.qrCornerStyle === 'rounded' ? 1.6 : 0.1"
                            [attr.fill]="el.qrFgColor || '#000000'"/>
                      <rect x="2" y="2" width="5" height="5"
                            [attr.rx]="el.qrCornerStyle === 'rounded' ? 0.9 : 0.1"
                            [attr.fill]="el.qrBgColor || '#ffffff'"/>
                      <rect x="3" y="3" width="3" height="3"
                            [attr.rx]="el.qrCornerStyle === 'rounded' ? 0.5 : 0.1"
                            [attr.fill]="el.qrFgColor || '#000000'"/>
                      <!-- Top-Right -->
                      <rect x="15" y="1" width="7" height="7"
                            [attr.rx]="el.qrCornerStyle === 'rounded' ? 1.6 : 0.1"
                            [attr.fill]="el.qrFgColor || '#000000'"/>
                      <rect x="16" y="2" width="5" height="5"
                            [attr.rx]="el.qrCornerStyle === 'rounded' ? 0.9 : 0.1"
                            [attr.fill]="el.qrBgColor || '#ffffff'"/>
                      <rect x="17" y="3" width="3" height="3"
                            [attr.rx]="el.qrCornerStyle === 'rounded' ? 0.5 : 0.1"
                            [attr.fill]="el.qrFgColor || '#000000'"/>
                      <!-- Bottom-Left -->
                      <rect x="1" y="15" width="7" height="7"
                            [attr.rx]="el.qrCornerStyle === 'rounded' ? 1.6 : 0.1"
                            [attr.fill]="el.qrFgColor || '#000000'"/>
                      <rect x="2" y="16" width="5" height="5"
                            [attr.rx]="el.qrCornerStyle === 'rounded' ? 0.9 : 0.1"
                            [attr.fill]="el.qrBgColor || '#ffffff'"/>
                      <rect x="3" y="17" width="3" height="3"
                            [attr.rx]="el.qrCornerStyle === 'rounded' ? 0.5 : 0.1"
                            [attr.fill]="el.qrFgColor || '#000000'"/>

                      <!-- === DATA + TIMING MODULES === -->
                      <ng-container *ngFor="let row of qrMatrix; let r = index">
                        <ng-container *ngFor="let on of row; let c = index">
                          <ng-container *ngIf="on && !isFinderArea(r, c)">
                            <!-- Circle dots -->
                            <circle *ngIf="el.qrDotStyle === 'dots'"
                                    [attr.cx]="c + 1.5" [attr.cy]="r + 1.5" r="0.42"
                                    [attr.fill]="el.qrFgColor || '#000000'"/>
                            <!-- Square or Rounded small rects -->
                            <rect *ngIf="el.qrDotStyle !== 'dots'"
                                  [attr.x]="c + 1.1" [attr.y]="r + 1.1"
                                  width="0.8" height="0.8"
                                  [attr.rx]="el.qrDotStyle === 'rounded' ? 0.4 : 0.05"
                                  [attr.fill]="el.qrFgColor || '#000000'"/>
                          </ng-container>
                        </ng-container>
                      </ng-container>
                    </svg>
                  </div>
                </ng-container>


                <!-- Text element -->
                <ng-container *ngIf="el.field !== '__QRCode__'">
                  <span class="w-full inline-block truncate px-1 uppercase" [style.textAlign]="el.textAlign">
                    {{ '{' + el.field + '}' }}
                  </span>
                </ng-container>

                <!-- Resize handle — right edge, only when focused -->
                <div *ngIf="focusedElement?.id === el.id"
                     (mousedown)="onResizeStart($event, el)"
                     class="absolute top-0 right-0 h-full w-3 flex items-center justify-center cursor-ew-resize z-50 group"
                     style="right: -6px;">
                  <div class="w-1.5 h-6 rounded-full shadow group-hover:opacity-80 transition-colors"
                       [ngClass]="el.field === '__QRCode__' ? 'bg-violet-500' : 'bg-blue-500'"></div>
                </div>
           </div>

           <!-- Drag drop placeholder hint -->
           <div *ngIf="elements.length === 0" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-40">
              <span class="text-3xl font-semibold text-slate-300">Drag fields here</span>
           </div>
      </div>
    </div>
  </main>

  <!-- RIGHT Panel — Properties, always visible -->
  <aside class="w-[280px] min-w-[280px] bg-white py-6 px-5 flex flex-col gap-5 shadow-[-1px_0_10px_rgba(0,0,0,0.05)] z-10 overflow-auto border-l border-slate-100">

    <div class="flex items-center justify-between pb-4 border-b border-slate-100 shrink-0">
      <h3 class="font-bold text-slate-700">Properties</h3>
      <button *ngIf="focusedElement" (click)="deselectElement()" class="w-7 h-7 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 transition-colors text-slate-500">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Placeholder when nothing selected -->
    <div *ngIf="!focusedElement" class="flex-1 flex flex-col items-center justify-center gap-3 text-center opacity-50 select-none">
      <svg class="w-10 h-10 text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M9 9h6M9 13h4"/>
      </svg>
      <p class="text-sm text-slate-400 font-medium">Click on a field<br>to edit its properties</p>
    </div>

    <!-- Properties form — only when an element is selected -->
    <ng-container *ngIf="focusedElement as el">
      <div class="flex-1 overflow-y-auto scrollbar-thin -mr-2 pr-2">
        <div class="flex flex-col gap-5">
          <!-- Field name (readonly) -->
          <div class="flex flex-col gap-2">
            <label class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Field</label>
            <div *ngIf="el.field === '__QRCode__'"
                 class="flex items-center gap-2 bg-violet-50 border border-violet-200 rounded-lg py-2 px-3">
              <svg class="w-4 h-4 text-violet-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
                <rect x="5" y="5" width="3" height="3" fill="currentColor" stroke="none"/>
                <rect x="16" y="5" width="3" height="3" fill="currentColor" stroke="none"/>
                <rect x="5" y="16" width="3" height="3" fill="currentColor" stroke="none"/>
              </svg>
              <span class="text-sm text-violet-700 font-semibold">QR Code</span>
            </div>
            <input *ngIf="el.field !== '__QRCode__'" type="text" disabled [value]="el.field"
                   class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm text-slate-700 font-semibold cursor-not-allowed">
          </div>

          <!-- QR Code: Style options -->
          <ng-container *ngIf="el.field === '__QRCode__'">

            <!-- Size -->
            <div class="flex flex-col gap-2">
              <label class="text-[11px] font-semibold text-violet-400 uppercase tracking-wider">Size (px)</label>
              <div class="flex items-center gap-2">
                <button (click)="el.width = el.width > 40 ? el.width - 10 : 40"
                        class="w-8 h-8 shrink-0 flex items-center justify-center rounded-lg border border-violet-200 bg-violet-50 hover:bg-violet-100 text-violet-600 font-bold text-lg transition-colors select-none">−</button>
                <input type="number" [(ngModel)]="el.width"
                       class="flex-1 min-w-0 bg-white border border-violet-200 rounded-lg py-2 px-3 text-sm focus:border-violet-400 outline-none text-violet-700 text-center font-semibold">
                <button (click)="el.width = el.width + 10"
                        class="w-8 h-8 shrink-0 flex items-center justify-center rounded-lg border border-violet-200 bg-violet-50 hover:bg-violet-100 text-violet-600 font-bold text-lg transition-colors select-none">+</button>
              </div>
              <p class="text-[10px] text-violet-300">Always square (width = height)</p>
            </div>

            <!-- Foreground color -->
            <div class="flex flex-col gap-2">
              <label class="text-[11px] font-semibold text-violet-400 uppercase tracking-wider">Dot Color</label>
              <div class="flex items-center gap-2">
                <input type="color" [(ngModel)]="el.qrFgColor"
                       class="w-10 h-10 border-0 p-0 rounded-lg cursor-pointer shrink-0">
                <input type="text" [(ngModel)]="el.qrFgColor"
                       class="flex-1 min-w-0 bg-white border border-violet-200 rounded-lg py-2.5 px-3 text-sm focus:border-violet-400 outline-none uppercase font-mono text-violet-700">
              </div>
            </div>

            <!-- Background color -->
            <div class="flex flex-col gap-2">
              <label class="text-[11px] font-semibold text-violet-400 uppercase tracking-wider">Background Color</label>
              <div class="flex items-center gap-2">
                <input type="color" [(ngModel)]="el.qrBgColor"
                       class="w-10 h-10 border-0 p-0 rounded-lg cursor-pointer shrink-0">
                <input type="text" [(ngModel)]="el.qrBgColor"
                       class="flex-1 min-w-0 bg-white border border-violet-200 rounded-lg py-2.5 px-3 text-sm focus:border-violet-400 outline-none uppercase font-mono text-violet-700">
              </div>
            </div>

            <!-- Dot style -->
            <div class="flex flex-col gap-2">
              <label class="text-[11px] font-semibold text-violet-400 uppercase tracking-wider">Dot Style</label>
              <div class="flex gap-2">
                <button *ngFor="let s of ['square','rounded','dots']"
                        (click)="setQrDotStyle(el, $any(s))"
                        [ngClass]="el.qrDotStyle === s
                          ? 'border-violet-500 bg-violet-100 text-violet-700 font-bold'
                          : 'border-slate-200 bg-white text-slate-500 hover:bg-slate-50'"
                        class="flex-1 border rounded-lg py-2 text-xs capitalize transition-colors">
                  {{ s }}
                </button>
              </div>
            </div>

            <!-- Corner style -->
            <div class="flex flex-col gap-2">
              <label class="text-[11px] font-semibold text-violet-400 uppercase tracking-wider">Corner Style</label>
              <div class="flex gap-2">
                <button *ngFor="let c of ['square','rounded']"
                        (click)="setQrCornerStyle(el, $any(c))"
                        [ngClass]="el.qrCornerStyle === c
                          ? 'border-violet-500 bg-violet-100 text-violet-700 font-bold'
                          : 'border-slate-200 bg-white text-slate-500 hover:bg-slate-50'"
                        class="flex-1 border rounded-lg py-2 text-xs capitalize transition-colors">
                  {{ c }}
                </button>
              </div>
            </div>

          </ng-container>

          <!-- Text element properties -->
          <ng-container *ngIf="el.field !== '__QRCode__'">
            <!-- Font Size -->
            <div class="flex flex-col gap-2">
              <label class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Font Size (px)</label>
              <input type="number" [(ngModel)]="el.fontSize"
                     class="w-full bg-white border border-slate-200 rounded-lg py-2 px-3 text-sm focus:border-blue-400 outline-none text-slate-700 transition-colors">
            </div>

            <!-- Color -->
            <div class="flex flex-col gap-2">
              <label class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Color</label>
              <div class="flex items-center gap-2">
                <input type="color" [(ngModel)]="el.color"
                       class="w-10 h-10 border-0 p-0 rounded-lg cursor-pointer shrink-0">
                <input type="text" [(ngModel)]="el.color"
                       class="flex-1 min-w-0 bg-white border border-slate-200 rounded-lg py-2.5 px-3 text-sm focus:border-blue-400 outline-none uppercase font-mono text-slate-700">
              </div>
            </div>

            <!-- Width -->
            <div class="flex flex-col gap-2">
              <label class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Width (px)</label>
              <div class="flex items-center gap-2">
                <button (click)="el.width = el.width > 20 ? el.width - 10 : 10"
                        class="w-8 h-8 shrink-0 flex items-center justify-center rounded-lg border border-slate-200 bg-slate-50 hover:bg-slate-100 text-slate-600 font-bold text-lg transition-colors select-none">
                  −
                </button>
                <input type="number" [(ngModel)]="el.width" class="flex-1 min-w-0 bg-white border border-slate-200 rounded-lg py-2 px-3 text-sm focus:border-blue-400 outline-none text-slate-700 text-center">
                <button (click)="el.width = el.width + 10"
                        class="w-8 h-8 shrink-0 flex items-center justify-center rounded-lg border border-slate-200 bg-slate-50 hover:bg-slate-100 text-slate-600 font-bold text-lg transition-colors select-none">
                  +
                </button>
              </div>
            </div>
          </ng-container>

          <!-- Font Weight -->
          <div class="flex flex-col gap-2">
            <label class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Font Weight</label>
            <select [(ngModel)]="el.fontWeight"
                    class="w-full bg-white border border-slate-200 rounded-lg py-2.5 px-3 text-sm focus:border-blue-400 outline-none text-slate-700">
              <option value="normal">Normal</option>
              <option value="bold">Bold</option>
              <option value="600">Semi-Bold</option>
              <option value="300">Light</option>
            </select>
          </div>

          <!-- Text Align -->
          <div class="flex flex-col gap-2">
            <label class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Text Alignment</label>
            <select [(ngModel)]="el.textAlign"
                    class="w-full bg-white border border-slate-200 rounded-lg py-2.5 px-3 text-sm focus:border-blue-400 outline-none text-slate-700">
              <option value="left">Left</option>
              <option value="center">Center</option>
              <option value="right">Right</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Delete button -->
      <div class="pt-4 border-t border-slate-100 shrink-0">
        <button (click)="deleteElement(el)" class="px-4 py-2.5 border border-red-200 text-red-500 bg-red-50/50 rounded-lg hover:bg-red-50 hover:border-red-300 transition-colors font-semibold text-sm w-full">
          Delete Field
        </button>
      </div>
    </ng-container>
  </aside>


</div>
